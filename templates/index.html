<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Willkommen - Kontakt</title>
    <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
    <div class="startup-screen">
        <div class="gradient-bg"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>
        </div>

        <div class="content">
            <h1 class="title">Willkommen</h1>
            <p class="subtitle">Bitte geben Sie Ihren Zugangscode ein</p>

            <div class="code-form">
                <input type="text" id="codeInput" maxlength="5" placeholder="_____" autocomplete="off">
                <button class="btn-see" onclick="submitCode()">Bestätigen</button>
            </div>
            <p id="message" class="message"></p>
        </div>

        <button class="admin-btn" onclick="openAdminLogin()">Admin Login</button>

        <div id="adminModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeAdminLogin()">&times;</span>
                <h2>Admin Anmeldung</h2>
                <input type="password" id="adminPassword" placeholder="Passwort eingeben">
                <button onclick="adminLogin()">Anmelden</button>
                <a href="#" onclick="forgotPassword(); return false;" class="forgot-link">Passwort vergessen?</a>
                <p id="adminMessage"></p>
            </div>
        </div>

        <div id="forgotModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeForgotPassword()">&times;</span>
                <h2 id="forgotTitle">Passwort zur&#252;cksetzen</h2>
                <p id="forgotText" style="color:#666;font-size:0.95rem;margin-bottom:20px;">Eine E-Mail mit einem R&#252;cksetzungslink wird an den Administrator gesendet.</p>
                <button id="forgotBtn" onclick="sendResetEmail()">E-Mail senden</button>
                <p id="forgotMessage"></p>
            </div>
        </div>
    </div>

    <script src="/static/script.js?v=7"></script>
</body>
</html>
