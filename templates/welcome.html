<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktdaten</title>
    <link rel="stylesheet" href="/static/style.css?v=7">
</head>
<body>
    <div class="welcome-screen">
        <div class="gradient-bg"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>
        </div>

        <div class="content">
            <div class="success-icon">✓</div>
            <h1 class="title">Willkommen!</h1>
            <p class="level-badge" id="levelBadge"></p>

            <div class="contact-card" id="contactCard">
                <div class="contact-card-header">
                    <div class="contact-avatar" id="contactAvatar">?</div>
                    <h2 id="contactName">Wird geladen...</h2>
                </div>
                <div class="contact-details">
                    <div class="contact-row" id="phoneRow" style="display:none;">
                        <span class="contact-icon">📞</span>
                        <a id="contactPhone" href=""></a>
                    </div>
                    <div class="contact-row" id="phone2Row" style="display:none;">
                        <span class="contact-icon">📱</span>
                        <a id="contactPhone2" href=""></a>
                    </div>
                    <div class="contact-row" id="emailRow" style="display:none;">
                        <span class="contact-icon">✉️</span>
                        <a id="contactEmail" href=""></a>
                    </div>
                    <div class="contact-row" id="addressRow" style="display:none;">
                        <span class="contact-icon">📍</span>
                        <span id="contactAddress"></span>
                    </div>
                    <div class="contact-row" id="websiteRow" style="display:none;">
                        <span class="contact-icon">🌐</span>
                        <a id="contactWebsite" href="" target="_blank"></a>
                    </div>
                    <div class="contact-row" id="fortniteRow" style="display:none;">
                        <span class="contact-icon">🎮</span>
                        <a id="contactFortnite" href="" target="_blank"></a>
                    </div>
                    <div class="contact-row" id="robloxRow" style="display:none;">
                        <span class="contact-icon">🧱</span>
                        <a id="contactRoblox" href="" target="_blank"></a>
                    </div>
                    <div class="contact-row" id="psnRow" style="display:none;">
                        <span class="contact-icon">🎯</span>
                        <a id="contactPsn" href="" target="_blank"></a>
                    </div>
                    <div class="contact-row" id="notesRow" style="display:none;">
                        <span class="contact-icon">📝</span>
                        <span id="contactNotes"></span>
                    </div>
                </div>
            </div>

            <button class="btn-see" onclick="goBack()">Zurück</button>

            <div class="guest-form-section" id="guestFormSection">
                <h3 class="guest-form-title">Hinterlassen Sie Ihre Daten</h3>
                <form id="guestForm" onsubmit="submitGuest(event)">
                    <div class="form-group">
                        <label for="guestName">Name *</label>
                        <input type="text" id="guestName" placeholder="Ihr Name" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="guestPhone">Telefon</label>
                        <input type="tel" id="guestPhone" placeholder="Ihre Telefonnummer" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="guestEmail">E-Mail</label>
                        <input type="email" id="guestEmail" placeholder="Ihre E-Mail-Adresse" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="guestFortnite">Fortnite</label>
                        <input type="text" id="guestFortnite" placeholder="Fortnite Benutzername" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="guestRoblox">Roblox</label>
                        <input type="text" id="guestRoblox" placeholder="Roblox Benutzername" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="guestPsn">PlayStation</label>
                        <input type="text" id="guestPsn" placeholder="PSN Benutzername" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="guestNotes">Nachricht</label>
                        <textarea id="guestNotes" placeholder="Optional: Nachricht..." rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn-see">Absenden</button>
                </form>
                <p id="guestMessage" class="message"></p>
            </div>
        </div>
    </div>

    <script src="/static/script.js?v=7"></script>
</body>
</html>
