<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort Zurücksetzen</title>
    <link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>
    <div class="startup-screen">
        <div class="gradient-bg"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>
        </div>

        <div class="content">
            <div id="resetForm" class="reset-form">
                <div class="success-icon" style="background:linear-gradient(135deg,#667eea,#764ba2);color:white;">&#128274;</div>
                <h1 class="title" style="font-size:2rem;">Neues Passwort</h1>
                <p class="subtitle">Geben Sie Ihr neues Passwort ein.</p>
                <input type="password" id="newPassword" placeholder="Neues Passwort" style="padding:15px;font-size:1rem;text-align:center;border:2px solid #ddd;border-radius:10px;width:100%;margin-bottom:10px;">
                <input type="password" id="confirmPassword" placeholder="Passwort bestätigen" style="padding:15px;font-size:1rem;text-align:center;border:2px solid #ddd;border-radius:10px;width:100%;margin-bottom:20px;">
                <button class="btn-see" style="width:100%;" onclick="resetPassword()">Passwort ändern</button>
                <p id="resetMessage" class="message"></p>
            </div>
            <div id="resetInvalid" class="reset-form" style="display:none;">
                <div class="success-icon" style="background:#ff6b6b;color:white;">&#10060;</div>
                <h1 class="title" style="font-size:2rem;">Link ungültig</h1>
                <p class="subtitle">Dieser Link ist abgelaufen oder ungültig.</p>
                <button class="btn-see" onclick="window.location.href='/'">Zurück zur Startseite</button>
            </div>
            <div id="resetSuccess" class="reset-form" style="display:none;">
                <div class="success-icon">&#10003;</div>
                <h1 class="title" style="font-size:2rem;">Erfolgreich!</h1>
                <p class="subtitle">Ihr Passwort wurde geändert.</p>
                <button class="btn-see" onclick="window.location.href='/'">Zurück zur Startseite</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('resetInvalid').style.display = 'block';
        } else {
            fetch('/api/verify-reset-token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.success) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('resetInvalid').style.display = 'block';
                }
            });
        }

        function resetPassword() {
            const pw = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const msg = document.getElementById('resetMessage');

            if (!pw || !confirm) {
                msg.textContent = 'Bitte füllen Sie alle Felder aus.';
                msg.className = 'message error';
                return;
            }
            if (pw !== confirm) {
                msg.textContent = 'Passwörter stimmen nicht überein.';
                msg.className = 'message error';
                return;
            }
            if (pw.length < 4) {
                msg.textContent = 'Passwort muss mindestens 4 Zeichen lang sein.';
                msg.className = 'message error';
                return;
            }

            fetch('/api/admin/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password: pw })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('resetForm').style.display = 'none';
                    document.getElementById('resetSuccess').style.display = 'block';
                } else {
                    msg.textContent = data.message;
                    msg.className = 'message error';
                }
            });
        }

        document.getElementById('newPassword')?.addEventListener('keypress', function(e) { if (e.key === 'Enter') resetPassword(); });
        document.getElementById('confirmPassword')?.addEventListener('keypress', function(e) { if (e.key === 'Enter') resetPassword(); });
    </script>
</body>
</html>
